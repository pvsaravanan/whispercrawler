{% extends "base.html" %}

{% block announce %}
  <a href="https://whispercrawl.com" target="_blank" style="display:flex; justify-content:center; padding:0px 0;">
    <img src="/assets/logo.png" alt="WhisperCrawler — Adaptive Web Scraping" style="max-height:60px;">
  </a>
{% endblock %}

{% block extrahead %}
    <!-- Open Graph -->
    <meta property="og:image" content="/assets/main_cover.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1344" />
    <meta property="og:image:height" content="768" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="WhisperCrawler documentation" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/assets/main_cover.png" />
    <meta name="twitter:site" content="@WhisperCrawl" />
    <meta name="twitter:creator" content="@WhisperCrawl" />

    <!-- General -->
    <meta name="author" content="Saravanan P V" />
    <meta name="theme-color" content="#673ab7" />
{% endblock %}
